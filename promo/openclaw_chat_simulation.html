<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw - Gateway Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000;
            --bg-sidebar: #050505;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --accent-red: #ff3333;
            --accent-blue: #3366ff;
            --success: #00ff88;
            --font-main: 'Inter', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: var(--font-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            font-size: 22px;
            /* Large font for mobile video */
        }

        /* Sidebar - Hidden/Simplified */
        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            padding: 2rem;
        }

        .logo {
            color: #fff;
            font-weight: 800;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 3rem;
        }

        .logo span {
            color: var(--accent-red);
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 1rem;
            color: var(--text-secondary);
            border-radius: 12px;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .nav-item.active {
            background-color: #1a0505;
            color: var(--accent-red);
        }

        /* Main Content */
        .main {
            flex: 1;
            background-color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            height: 90px;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 3rem;
        }

        /* Chat Area - Mobile Optimized Width */
        .chat-container {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin: 0 auto;
            width: 100%;
            max-width: 800px;
            /* Focused column */
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            gap: 1rem;
            max-width: 100%;
            animation: fadeIn 0.6s ease-out;
            /* Slower fade in */
            align-items: flex-end;
            margin-bottom: 1rem;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            flex-shrink: 0;
            font-size: 1.2rem;
        }

        .user .avatar {
            background-color: #331111;
            color: var(--accent-red);
        }

        .agent .avatar {
            background-color: #222;
            color: #fff;
        }

        .bubble {
            padding: 1.2rem 1.5rem;
            border-radius: 20px;
            font-size: 1.2rem;
            line-height: 1.5;
            /* More readable spacing */
            position: relative;
            max-width: 85%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .user .bubble {
            background-color: #331111;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .agent .bubble {
            background-color: #111;
            border: 1px solid #333;
            border-bottom-left-radius: 4px;
        }

        .code-block {
            font-family: var(--font-code);
            font-size: 1rem;
            background-color: #000;
            padding: 1.2rem;
            border-radius: 10px;
            margin-top: 0.8rem;
            border: 1px solid #333;
            color: #ccc;
            white-space: pre-wrap;
        }

        .error-text {
            color: #ff5555;
            font-weight: bold;
        }

        .success-text {
            color: var(--success);
            font-weight: bold;
        }

        /* Input Area */
        .input-area {
            padding: 2rem;
            border-top: 1px solid #222;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .input-box {
            background-color: #111;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 0 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
        }

        .input-placeholder {
            color: #555;
            font-size: 1.3rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .typing {
            font-size: 1rem;
            color: #666;
            margin-left: 80px;
            /* Align near agent avatar position approximately */
            margin-bottom: 1rem;
            display: none;
            font-style: italic;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.4;
            }
        }

        .typing.active {
            display: block;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="logo">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 10h.01" />
                <path d="M15 10h.01" />
                <path d="M12 2a8 8 0 0 0 -8 8v12l3 -3l2.5 2.5l2.5 -2.5l2.5 2.5l2.5 -2.5l3 3v-12a8 8 0 0 0 -8 -8z" />
            </svg>
            <span>OPEN</span>CLAW
        </div>

        <div class="nav-item active">
            <span>💬</span> Chat
        </div>
        <div class="nav-item">
            <span>⚡</span> Live Activity
        </div>
        <div class="nav-item">
            <span>⚙️</span> Config
        </div>
    </div>

    <div class="main">
        <div class="header">
            <div style="font-weight: 800; font-size: 1.5rem;">AGENT: BOZO</div>
            <div style="color: var(--success); font-weight: 800;">● ONLINE</div>
        </div>

        <div class="chat-container" id="chat"></div>
        <div class="typing" id="typing">Agent thinking...</div>

        <div class="input-area">
            <div class="input-box">
                <span class="input-placeholder" id="input">Message...</span>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const typing = document.getElementById('typing');
        const input = document.getElementById('input');

        // Adjusted timings for human readability
        // delay: Time to "think" or "react" before action starts
        // readTime: Time to pause AFTER message is shown so viewer can read it
        const script = [
            { role: 'user', text: "swap 1.00 USDC for GIB", delay: 1000, readTime: 1000 },
            { role: 'agent', text: "openclaw --status", type: 'code', delay: 2000, readTime: 2500 },
            { role: 'agent', text: "Hedera Mainnet: [CONNECTED]\nGhost Chain: ACTIVE", type: 'code', delay: 1500, readTime: 4000 },
            { role: 'user', text: "Hurry up already. Status?", delay: 1500, readTime: 1000 },
            { role: 'agent', text: `⚠️ SWAP FAILED: Insufficient Funds.\n\nRequired: 1.00 USDC\nAvailable: 0.46 USDC`, type: 'code', delay: 3000, readTime: 6000 },
            { role: 'user', text: "wtf? Fix it.", delay: 3000, readTime: 1000 },
            { role: 'agent', text: "I can swap 0.45 USDC instead. Proceed?", delay: 2500, readTime: 4500 },
            { role: 'user', text: "Yes", delay: 1500, readTime: 500 },
            { role: 'agent', text: `>> Executing swap...\nRoute: USDC -> HBAR -> GIB`, type: 'code', delay: 2000, readTime: 3500 },
            { role: 'agent', text: `✅ SUCCESS\n\nSwapped 0.45 USDC -> GIB\n\nBalances:\nUSDC: **.**\nGIB: ***.**`, type: 'code-success', delay: 2500, readTime: 8000 },
            { role: 'user', text: "Thanks. Switching you off. Renaming you to 'Bozo'. Goodnight.", delay: 4000, readTime: 5000 }
        ];

        async function addMsg(msg) {
            const div = document.createElement('div');
            div.className = `message ${msg.role}`;

            let content = `<div class="bubble">`;
            if (msg.type === 'code' || msg.type === 'code-success') {
                const colorClass = msg.type === 'code-success' ? 'success-text' : (msg.text.includes('FAILED') ? 'error-text' : '');
                content += `<div class="code-block ${colorClass}">${msg.text}</div>`;
            } else {
                content += msg.text;
            }
            content += `</div>`;

            div.innerHTML = `<div class="avatar">${msg.role === 'user' ? 'U' : '👻'}</div>${content}`;
            chat.appendChild(div);

            // Ensure smooth scroll to bottom
            setTimeout(() => {
                chat.scrollTo({
                    top: chat.scrollHeight,
                    behavior: 'smooth'
                });
            }, 100);
        }

        async function run() {
            for (const line of script) {
                if (line.role === 'agent') {
                    // Agent "Thinking" Phase
                    typing.classList.add('active');
                    await new Promise(r => setTimeout(r, line.delay));
                    typing.classList.remove('active');
                    addMsg(line);
                } else {
                    // User "Reaction" Phase
                    await new Promise(r => setTimeout(r, line.delay || 500));

                    input.style.color = '#fff';
                    // User "Typing" Phase - Slower to look human
                    for (let i = 0; i < line.text.length; i++) {
                        input.innerText = line.text.substring(0, i + 1);
                        // 60-120ms variable delay per char
                        await new Promise(r => setTimeout(r, 60 + Math.random() * 60));
                    }
                    // Pause before hitting Enter
                    await new Promise(r => setTimeout(r, 800));

                    input.innerText = 'Message...';
                    input.style.color = '#555';
                    addMsg(line);
                }

                // Reading Phase - Time for viewer to read before next action
                await new Promise(r => setTimeout(r, line.readTime || 2000));
            }
        }

        // Start after 1.5s
        setTimeout(run, 1500);
    </script>

</body>

</html>
