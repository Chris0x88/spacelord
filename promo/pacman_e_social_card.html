<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Social Card - Pacman</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap"
        rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0e0e0e;
            font-family: 'Inter', sans-serif;
        }

        /* 
           GitHub Social Card Dimensions: 1280 x 640 px 
           Safe Zone: ~40px border
        */
        .card-container {
            width: 1280px;
            height: 640px;
            background-color: #050508;
            position: relative;
            overflow: hidden;
            border: 1px solid #333;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px;
            /* Generous padding for safe zone */
            box-sizing: border-box;
        }

        /* Background Effects */
        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .glow-orb {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 243, 255, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            top: -100px;
            right: -100px;
            z-index: 1;
        }

        .glow-orb-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 51, 51, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
            bottom: -100px;
            left: -100px;
            z-index: 1;
        }

        /* Content Layer */
        .content {
            z-index: 10;
            position: relative;
        }

        .repo-path {
            font-family: 'JetBrains Mono', monospace;
            color: #888;
            font-size: 1.8rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .repo-icon {
            color: #fff;
        }

        .title {
            font-size: 6rem;
            font-weight: 800;
            color: #fff;
            margin: 0;
            line-height: 1.1;
            letter-spacing: -2px;
            background: linear-gradient(90deg, #fff, #aaa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 2.2rem;
            color: #888;
            margin-top: 1.5rem;
            max-width: 800px;
            line-height: 1.4;
        }

        .tags {
            display: flex;
            gap: 20px;
            margin-top: 3rem;
        }

        .tag {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            padding: 12px 24px;
            border-radius: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ccc;
        }

        .tag.highlight {
            border-color: rgba(0, 243, 255, 0.3);
            color: #00f3ff;
            background: rgba(0, 243, 255, 0.05);
        }

        .ghost-icon {
            position: absolute;
            right: 80px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18rem;
            opacity: 0.8;
            animation: float 6s ease-in-out infinite;
            filter: drop-shadow(0 0 40px rgba(0, 243, 255, 0.2));
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(-55%);
            }

            50% {
                transform: translateY(-45%);
            }
        }

        .stats {
            position: absolute;
            bottom: 60px;
            right: 80px;
            display: flex;
            gap: 30px;
            font-family: 'JetBrains Mono', monospace;
            color: #666;
            font-size: 1.2rem;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>

<body>

    <div class="card-container">
        <div class="bg-grid"></div>
        <div class="glow-orb"></div>
        <div class="glow-orb-2"></div>

        <div class="content">
            <div class="repo-path">
                <svg class="repo-icon" height="32" viewBox="0 0 16 16" version="1.1" width="32" aria-hidden="true"
                    fill="currentColor">
                    <path
                        d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1V9h-8c-.356 0-.694.074-1 .208V2.5a1 1 0 0 1 1-1h8ZM5 12.25v3.25a.25.25 0 0 0 .4.2l1.45-1.087a.249.249 0 0 1 .3 0L8.6 15.7a.25.25 0 0 0 .4-.2v-3.25a.25.25 0 0 0-.25-.25h-3.5a.25.25 0 0 0-.25.25Z">
                    </path>
                </svg>
                Chris0x88 /
            </div>

            <h1 class="title">pacman-e</h1>
            <p class="subtitle">A CLI tool for AI Agents to swap tokens on Hedera.<br>Ghost Chain Primitive. <span
                    style="color: #FF8000;">McLaren revival.</span></p>

            <div class="tags">
                <div class="tag highlight">
                    <span style="width: 10px; height: 10px; background: #00f3ff; border-radius: 50%;"></span>
                    Python
                </div>
                <div class="tag">Hedera Hashgraph</div>
                <div class="tag">AI Agentry</div>
            </div>
        </div>

        <div class="ghost-icon">👻</div>

    </div>

</body>

</html>
