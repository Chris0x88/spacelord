name: test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

# Cancel superseded runs on the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (Python 3.10, sim mode)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Sync dev dependencies
        run: uv sync --extra dev

      # Strict pytest. Every collected test must pass. Live-broadcast verifiers
      # keep `verify_*.py` / `live_test_*.py` prefixes (not collected) and are
      # run manually as scripts. The TestLiveIntegration class in
      # test_massive_suite.py is gated behind SPACELORD_LIVE_TESTS=true and
      # stays skipped here.
      - name: Run pytest (strict — all tests must pass)
        run: uv run pytest tests/ -v

  lint:
    name: ruff (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Advisory only for the first pass — never run on this 26.5K-LOC codebase
    # before. Surfaces issues without blocking. Make this required once the
    # initial cleanup pass lands.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Sync dev dependencies
        run: uv sync --extra dev

      - name: Ruff check (advisory — does not block merge yet)
        run: uv run ruff check src cli lib tests
