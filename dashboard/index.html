<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <title>PACMAN Agent — Crypto Trading Dashboard</title>
    <meta name="description" content="PACMAN Agent: Real-time Bitcoin allocation, HCS signals, and automated rebalancing powered by Hedera." />
    <meta name="theme-color" content="#030303" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(6, 182, 212, 0.3) transparent;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(6, 182, 212, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(6, 182, 212, 0.5);
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @keyframes slide-in {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .animate-slide-in { animation: slide-in 0.3s ease-out; }
        .animate-fade-in { animation: fade-in 0.3s ease-out; }
        .status-online { animation: pulse-glow 2s ease-in-out infinite; }

        .glassmorphic {
            background: linear-gradient(135deg, rgba(17, 24, 39, 0.6) 0%, rgba(17, 24, 39, 0.2) 100%);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .card-gradient {
            background: linear-gradient(135deg, rgba(17, 24, 39, 0.6) 0%, rgba(17, 24, 39, 0.2) 100%);
            backdrop-filter: blur(12px);
        }

        .hero-gradient {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.1) 0%, rgba(6, 182, 212, 0.05) 100%);
        }

        .tab-active {
            border-bottom: 2px solid #06b6d4;
            color: #06b6d4;
        }

        .tab-inactive {
            border-bottom: 2px solid transparent;
            color: #9ca3af;
        }

        .progress-bar {
            background: linear-gradient(90deg, rgba(6, 182, 212, 0.2) 0%, rgba(6, 182, 212, 0.4) 100%);
        }

        .chart-placeholder {
            background: linear-gradient(45deg, rgba(6, 182, 212, 0.05) 0%, rgba(17, 24, 39, 0.5) 100%);
        }

        .demo-banner {
            background: linear-gradient(90deg, rgba(251, 146, 60, 0.1) 0%, rgba(251, 146, 60, 0.05) 100%);
            border: 1px solid rgba(251, 146, 60, 0.2);
        }
    </style>
</head>

<body class="bg-gray-950 text-white font-sans" style="background: #030303;">
    <div x-data="dashboardApp()" @keydown.escape="closeMobileMenu()" class="min-h-screen">
        <!-- Demo Banner -->
        <template x-if="demoMode">
            <div class="demo-banner p-3 flex items-center justify-center gap-3 border-b">
                <span class="text-sm text-orange-400 font-medium">🔌 Demo Mode</span>
                <span class="text-xs text-orange-300">Connect Pacman daemon on http://127.0.0.1:8088 for live data</span>
            </div>
        </template>

        <!-- Header -->
        <header class="sticky top-0 z-40 border-b border-white/[0.06] glassmorphic">
            <div class="px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-cyan-400 to-cyan-500 flex items-center justify-center font-bold text-gray-950">P</div>
                    <div>
                        <h1 class="text-lg font-bold tracking-wider">PACMAN AGENT</h1>
                        <p class="text-xs text-gray-400 tracking-widest">CRYPTO ALLOCATION ENGINE</p>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 px-3 py-2 rounded-lg glassmorphic hidden sm:flex">
                        <div class="w-2 h-2 rounded-full" :class="data.status === 'online' ? 'bg-emerald-400 status-online' : 'bg-gray-500'"></div>
                        <span class="text-xs font-medium" x-text="data.status === 'online' ? 'ONLINE' : 'OFFLINE'"></span>
                    </div>

                    <button @click="toggleMobileMenu()" class="p-2 rounded-lg glassmorphic sm:hidden">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Tabs -->
            <div class="px-4 sm:px-6 lg:px-8 flex gap-8 border-t border-white/[0.06] overflow-x-auto">
                <template x-for="tab in tabs" :key="tab">
                    <button @click="activeTab = tab" :class="activeTab === tab ? 'tab-active' : 'tab-inactive'" class="px-1 py-4 text-sm font-medium transition-colors whitespace-nowrap">
                        <span x-text="tab"></span>
                    </button>
                </template>
            </div>
        </header>

        <!-- Main Content -->
        <main class="p-4 sm:p-6 lg:p-8">
            <!-- Tab: Overview -->
            <template x-if="activeTab === 'Overview'">
                <div class="animate-slide-in space-y-6">
                    <!-- Hero Card -->
                    <div class="hero-gradient card-gradient rounded-2xl p-6 sm:p-8 border border-white/[0.06]">
                        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                            <div>
                                <h2 class="text-2xl sm:text-4xl font-bold mb-2">PACMAN AGENT</h2>
                                <div class="flex items-center gap-3">
                                    <div class="flex items-center gap-2">
                                        <div class="w-3 h-3 rounded-full bg-emerald-400 status-online"></div>
                                        <span class="text-sm font-medium text-emerald-400" x-text="data.status.toUpperCase()"></span>
                                    </div>
                                    <span class="text-xs text-gray-400 font-mono" x-text="new Date().toLocaleTimeString()"></span>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-xs text-gray-400 mb-1">TOTAL PORTFOLIO VALUE</div>
                                <div class="text-3xl font-bold font-mono text-cyan-400" x-text="'$' + formatNumber(data.portfolio.totalUSD)"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Portfolio Grid -->
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <!-- WBTC Card -->
                        <div class="card-gradient rounded-2xl p-6 border border-white/[0.06]">
                            <div class="text-xs text-gray-400 tracking-widest mb-4">WBTC BALANCE</div>
                            <div class="mb-4">
                                <div class="text-2xl font-bold font-mono text-white" x-text="formatNumber(data.portfolio.wbtc, 8) + ' ₿'"></div>
                                <div class="text-xs text-gray-500 mt-2" x-text="'$ ' + formatNumber(data.portfolio.wbtcUSD)"></div>
                            </div>
                            <div class="flex items-center justify-between text-xs">
                                <span class="text-gray-400">Portfolio Weight</span>
                                <span class="font-mono text-cyan-400" x-text="data.portfolio.wbtcPercent + '%'"></span>
                            </div>
                        </div>

                        <!-- USDC Card -->
                        <div class="card-gradient rounded-2xl p-6 border border-white/[0.06]">
                            <div class="text-xs text-gray-400 tracking-widest mb-4">USDC BALANCE</div>
                            <div class="mb-4">
                                <div class="text-2xl font-bold font-mono text-white" x-text="formatNumber(data.portfolio.usdc, 6) + ' ⊔'"></div>
                                <div class="text-xs text-gray-500 mt-2" x-text="'$ ' + formatNumber(data.portfolio.usdc)"></div>
                            </div>
                            <div class="flex items-center justify-between text-xs">
                                <span class="text-gray-400">Portfolio Weight</span>
                                <span class="font-mono text-cyan-400" x-text="data.portfolio.usdcPercent + '%'"></span>
                            </div>
                        </div>

                        <!-- HBAR Card -->
                        <div class="card-gradient rounded-2xl p-6 border border-white/[0.06]">
                            <div class="text-xs text-gray-400 tracking-widest mb-4">HBAR BALANCE</div>
                            <div class="mb-4">
                                <div class="text-2xl font-bold font-mono text-white" x-text="formatNumber(data.portfolio.hbar, 2) + ' ℏ'"></div>
                                <div class="text-xs text-gray-500 mt-2" x-text="'$ ' + formatNumber(data.portfolio.hbarUSD)"></div>
                            </div>
                            <div class="flex items-center justify-between text-xs">
                                <span class="text-gray-400">Portfolio Weight</span>
                                <span class="font-mono text-cyan-400" x-text="data.portfolio.hbarPercent + '%'"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Today's Signal & Rebalance Info -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <!-- Today's Signal -->
                        <div class="card-gradient rounded-2xl p-6 border border-white/[0.06]">
                            <h3 class="text-sm font-bold tracking-wider text-gray-300 mb-4">TODAY'S SIGNAL</h3>
                            <div class="space-y-3">
                                <div>
                                    <div class="text-xs text-gray-400 mb-2">TARGET ALLOCATION</div>
                                    <div class="text-3xl font-bold text-cyan-400 font-mono" x-text="data.signal.allocation + '%'"></div>
                                </div>
                                <div>
                                    <div class="text-xs text-gray-400 mb-2">STANCE</div>
                                    <div class="px-3 py-2 rounded-lg w-fit" :class="getStanceColor(data.signal.stance)">
                                        <span class="text-xs font-bold tracking-wider" x-text="data.signal.stance"></span>
                                    </div>
                                </div>
                                <div>
                                    <div class="text-xs text-gray-400 mb-2">PHASE</div>
                                    <span class="text-sm text-cyan-400 font-mono" x-text="data.signal.phase"></span>
                                </div>
                            </div>
                        </div>

                        <!-- Last Rebalance -->
                        <div class="card-gradient rounded-2xl p-6 border border-white/[0.06]">
                            <h3 class="text-sm font-bold tracking-wider text-gray-300 mb-4">LAST REBALANCE</h3>
                            <div class="space-y-3">
                                <div>
                                    <div class="text-xs text-gray-400 mb-1">DATE</div>
                                    <div class="text-sm font-mono text-white" x-text="formatDate(data.lastRebalance.date)"></div>
                                </div>
                                <div>
                                    <div class="text-xs text-gray-400 mb-1">ACTION</div>
                                    <div class="px-3 py-2 rounded-lg w-fit" :class="data.lastRebalance.direction === 'BUY' ? 'bg-emerald-400/10 text-emerald-400' : 'bg-red-400/10 text-red-400'">
                                        <span class="text-xs font-bold tracking-wider" x-text="data.lastRebalance.direction"></span>
                                    </div>
                                </div>
                                <div>
                                    <div class="text-xs text-gray-400 mb-1">AMOUNT</div>
                                    <div class="text-sm font-mono text-white" x-text="'$' + formatNumber(data.lastRebalance.amount)"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- HCS Status -->
                    <div class="card-gradient rounded-2xl p-6 border border-white/[0.06]">
                        <h3 class="text-sm font-bold tracking-wider text-gray-300 mb-4">HCS STATUS</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                            <div>
                                <div class="text-xs text-gray-400 mb-2">TOPIC ID</div>
                                <div class="text-sm font-mono text-cyan-400 break-all" x-text="data.hcs.topicId"></div>
                            </div>
                            <div>
                                <div class="text-xs text-gray-400 mb-2">LAST BROADCAST</div>
                                <div class="text-sm text-white" x-text="formatTimeAgo(data.hcs.lastBroadcast)"></div>
                            </div>
                            <div>
                                <div class="text-xs text-gray-400 mb-2">MESSAGES</div>
                                <div class="text-2xl font-bold text-cyan-400 font-mono" x-text="data.hcs.messageCount"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Tab: Rebalancer -->
            <template x-if="activeTab === 'Rebalancer'">
                <div class="animate-slide-in space-y-6">
                    <!-- Power Law Chart -->
                    <div class="chart-placeholder rounded-2xl p-8 border border-white/[0.06] flex flex-col items-center justify-center min-h-96 overflow-hidden">
                        <template x-if="!demoMode">
                            <img :src="chartImageUrl" alt="Power Law Model Chart" class="max-w-full max-h-full object-contain" @error="handleChartError()" />
                        </template>
                        <template x-if="demoMode">
                            <div class="flex flex-col items-center justify-center">
                                <svg class="w-16 h-16 text-gray-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                                </svg>
                                <p class="text-center text-gray-400 font-mono text-sm">Connect daemon to view power law chart</p>
                                <p class="text-center text-gray-500 text-xs mt-2">http://127.0.0.1:8088</p>
                            </div>
                        </template>
                    </div>

                    <!-- Allocation Status -->
                    <div class="card-gradient rounded-2xl p-6 border border-white/[0.06]">
                        <h3 class="text-sm font-bold tracking-wider text-gray-300 mb-6">ALLOCATION STATUS</h3>

                        <div class="space-y-6">
                            <!-- WBTC -->
                            <div>
                                <div class="flex items-center justify-between mb-3">
                                    <span class="text-sm text-gray-400">WBTC</span>
                                    <span class="text-sm font-mono">
                                        <span class="text-white" x-text="data.allocation.wbtcCurrent + '%'"></span>
                                        <span class="text-gray-500"> / </span>
                                        <span class="text-cyan-400" x-text="data.allocation.wbtcTarget + '%'"></span>
                                    </span>
                                </div>
                                <div class="w-full h-2 rounded-full progress-bar overflow-hidden">
                                    <div class="h-full bg-gradient-to-r from-cyan-400 to-cyan-500 rounded-full transition-all duration-300" :style="`width: ${Math.min(data.allocation.wbtcCurrent, 100)}%`"></div>
                                </div>
                                <div class="text-xs text-gray-500 mt-2">Target: <span x-text="data.allocation.wbtcTarget + '%'"></span></div>
                            </div>

                            <!-- USDC -->
                            <div>
                                <div class="flex items-center justify-between mb-3">
                                    <span class="text-sm text-gray-400">USDC</span>
                                    <span class="text-sm font-mono">
                                        <span class="text-white" x-text="data.allocation.usdcCurrent + '%'"></span>
                                        <span class="text-gray-500"> / </span>
                                        <span class="text-cyan-400" x-text="data.allocation.usdcTarget + '%'"></span>
                                    </span>
                                </div>
                                <div class="w-full h-2 rounded-full progress-bar overflow-hidden">
                                    <div class="h-full bg-gradient-to-r from-cyan-400 to-cyan-500 rounded-full transition-all duration-300" :style="`width: ${Math.min(data.allocation.usdcCurrent, 100)}%`"></div>
                                </div>
                                <div class="text-xs text-gray-500 mt-2">Target: <span x-text="data.allocation.usdcTarget + '%'"></span></div>
                            </div>
                        </div>
                    </div>

                    <!-- Rebalance History -->
                    <div class="card-gradient rounded-2xl p-6 border border-white/[0.06]">
                        <h3 class="text-sm font-bold tracking-wider text-gray-300 mb-4">REBALANCE HISTORY</h3>
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm">
                                <thead>
                                    <tr class="border-b border-white/[0.06]">
                                        <th class="text-left py-3 px-4 text-xs text-gray-400 font-medium tracking-wider">DATE</th>
                                        <th class="text-left py-3 px-4 text-xs text-gray-400 font-medium tracking-wider">ACTION</th>
                                        <th class="text-right py-3 px-4 text-xs text-gray-400 font-medium tracking-wider">WBTC</th>
                                        <th class="text-right py-3 px-4 text-xs text-gray-400 font-medium tracking-wider">USDC</th>
                                        <th class="text-right py-3 px-4 text-xs text-gray-400 font-medium tracking-wider">PRICE</th>
                                        <th class="text-center py-3 px-4 text-xs text-gray-400 font-medium tracking-wider">STATUS</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="trade in data.rebalanceHistory" :key="trade.id">
                                        <tr class="border-b border-white/[0.06] hover:bg-white/[0.02] transition-colors">
                                            <td class="py-4 px-4 text-xs text-gray-400 font-mono" x-text="formatDate(trade.date)"></td>
                                            <td class="py-4 px-4">
                                                <span class="px-3 py-1 rounded-lg text-xs font-bold" :class="trade.action === 'BUY' ? 'bg-emerald-400/10 text-emerald-400' : 'bg-red-400/10 text-red-400'" x-text="trade.action"></span>
                                            </td>
                                            <td class="py-4 px-4 text-xs text-right text-white font-mono" x-text="formatNumber(trade.wbtc, 8)"></td>
                                            <td class="py-4 px-4 text-xs text-right text-white font-mono" x-text="'$' + formatNumber(trade.usdc)"></td>
                                            <td class="py-4 px-4 text-xs text-right text-cyan-400 font-mono" x-text="'$' + formatNumber(trade.price)"></td>
                                            <td class="py-4 px-4 text-center">
                                                <span class="px-2 py-1 rounded text-xs font-medium" :class="trade.status === 'CONFIRMED' ? 'bg-emerald-400/10 text-emerald-400' : 'bg-gray-400/10 text-gray-400'" x-text="trade.status"></span>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Next Check -->
                    <div class="card-gradient rounded-2xl p-6 border border-white/[0.06]">
                        <div class="flex items-center justify-between">
                            <span class="text-sm text-gray-400">NEXT REBALANCE CHECK</span>
                            <span class="text-2xl font-bold font-mono text-cyan-400" x-text="getCountdown()"></span>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Tab: HCS Signals -->
            <template x-if="activeTab === 'HCS Signals'">
                <div class="animate-slide-in space-y-6">
                    <!-- Subscribe Section -->
                    <div class="card-gradient rounded-2xl p-6 sm:p-8 border border-white/[0.06] hero-gradient">
                        <h3 class="text-xl sm:text-2xl font-bold mb-2">Subscribe to Daily Signals</h3>
                        <p class="text-gray-400 text-sm mb-4">Get real-time allocation recommendations and market phase updates</p>
                        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                            <div>
                                <div class="text-3xl font-bold text-cyan-400 font-mono mb-1">0.14 Ⱨ/day</div>
                                <div class="text-xs text-gray-400">≈ $10/year at current rates</div>
                            </div>
                            <button class="px-6 py-3 rounded-xl bg-gradient-to-r from-cyan-400 to-cyan-500 text-gray-950 font-bold tracking-wider hover:shadow-lg hover:shadow-cyan-500/20 transition-all">
                                SUBSCRIBE NOW
                            </button>
                        </div>
                    </div>

                    <!-- Signal Format -->
                    <div class="card-gradient rounded-2xl p-6 border border-white/[0.06]">
                        <h3 class="text-sm font-bold tracking-wider text-gray-300 mb-4">SIGNAL FORMAT</h3>
                        <div class="space-y-4 text-xs text-gray-400 font-mono">
                            <div class="p-3 bg-gray-900/40 rounded-lg border border-white/[0.06]">
                                <div class="text-cyan-400 mb-2">HCS Topic <span class="text-gray-500">0.0.10371598</span> — Signal v1.1:</div>
                                <pre class="overflow-x-auto text-xs">{
  "type": "SIGNAL",
  "signal": "BTC_REBALANCER",
  "sender": "0.0.10301803",
  "data": {
    "allocation_pct": 58,
    "stance": "balanced",
    "valuation": "deep_value",
    "tagline": "Cycle 5 | 47% complete | Late Cycle Peak Zone"
  }
}</pre>
                            </div>
                        </div>
                    </div>

                    <!-- Signal Feed -->
                    <div class="card-gradient rounded-2xl p-6 border border-white/[0.06]">
                        <h3 class="text-sm font-bold tracking-wider text-gray-300 mb-4">RECENT SIGNALS</h3>
                        <div class="space-y-3">
                            <template x-for="signal in data.signals.slice(0, 5)" :key="signal.id">
                                <div class="p-4 bg-gray-900/40 rounded-xl border border-white/[0.06] hover:border-cyan-400/20 transition-all">
                                    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-3">
                                        <div class="text-xs text-gray-400 font-mono" x-text="formatDate(signal.date)"></div>
                                        <span class="px-3 py-1 rounded-lg text-xs font-bold w-fit" :class="getStanceColor(signal.stance)" x-text="signal.stance"></span>
                                    </div>
                                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                        <div>
                                            <div class="text-xs text-gray-500 mb-1">ALLOCATION</div>
                                            <div class="text-lg font-bold text-cyan-400 font-mono" x-text="signal.allocation + '%'"></div>
                                        </div>
                                        <div>
                                            <div class="text-xs text-gray-500 mb-1">PHASE</div>
                                            <div class="text-sm text-white" x-text="signal.phase"></div>
                                        </div>
                                        <div>
                                            <div class="text-xs text-gray-500 mb-1">CONFIDENCE</div>
                                            <div class="text-sm font-mono text-emerald-400" x-text="(signal.confidence * 100).toFixed(0) + '%'"></div>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Tab: Swap -->
            <template x-if="activeTab === 'Swap'">
                <div class="animate-slide-in space-y-6">
                    <!-- Swap Interface -->
                    <div class="card-gradient rounded-2xl p-6 sm:p-8 border border-white/[0.06]">
                        <h3 class="text-lg font-bold tracking-wider mb-6">EXECUTE SWAP</h3>

                        <div class="space-y-4 mb-6">
                            <div>
                                <label class="block text-xs text-gray-400 font-medium tracking-wider mb-3">FROM TOKEN</label>
                                <select x-model="swap.fromToken" class="w-full px-4 py-3 rounded-xl bg-gray-900/60 border border-white/[0.06] text-white font-mono focus:border-cyan-400 outline-none transition-colors">
                                    <option value="WBTC">WBTC — Bitcoin</option>
                                    <option value="USDC">USDC — US Dollar Coin</option>
                                    <option value="HBAR">HBAR — Hedera Token</option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-xs text-gray-400 font-medium tracking-wider mb-3">AMOUNT</label>
                                <input x-model="swap.amount" type="number" placeholder="0.00" class="w-full px-4 py-3 rounded-xl bg-gray-900/60 border border-white/[0.06] text-white font-mono placeholder-gray-600 focus:border-cyan-400 outline-none transition-colors" />
                            </div>

                            <div>
                                <label class="block text-xs text-gray-400 font-medium tracking-wider mb-3">TO TOKEN</label>
                                <select x-model="swap.toToken" class="w-full px-4 py-3 rounded-xl bg-gray-900/60 border border-white/[0.06] text-white font-mono focus:border-cyan-400 outline-none transition-colors">
                                    <option value="USDC">USDC — US Dollar Coin</option>
                                    <option value="WBTC">WBTC — Bitcoin</option>
                                    <option value="HBAR">HBAR — Hedera Token</option>
                                </select>
                            </div>

                            <template x-if="swap.amount">
                                <div class="p-4 bg-cyan-400/10 rounded-xl border border-cyan-400/20">
                                    <div class="text-xs text-gray-400 mb-2">ESTIMATED QUOTE</div>
                                    <div class="text-2xl font-bold text-cyan-400 font-mono" x-text="swap.fromToken === 'WBTC' ? (swap.amount * 94250).toLocaleString() + ' ' + swap.toToken : (swap.amount * (swap.fromToken === 'USDC' ? 0.0000106 : 0.000089)).toFixed(8) + ' ' + swap.toToken"></div>
                                    <div class="text-xs text-gray-500 mt-2">Price impact: ~0.3%</div>
                                </div>
                            </template>
                        </div>

                        <button class="w-full px-6 py-3 rounded-xl bg-gradient-to-r from-cyan-400 to-cyan-500 text-gray-950 font-bold tracking-wider hover:shadow-lg hover:shadow-cyan-500/20 transition-all">
                            EXECUTE VIA AGENT
                        </button>

                        <p class="text-xs text-gray-400 text-center mt-4">Or say: <span class="font-mono text-cyan-400">"swap &lt;amount&gt; &lt;token&gt; for &lt;token&gt;"</span> in OpenClaw</p>
                    </div>

                    <!-- Recent Swaps -->
                    <div class="card-gradient rounded-2xl p-6 border border-white/[0.06]">
                        <h3 class="text-sm font-bold tracking-wider text-gray-300 mb-4">RECENT SWAPS</h3>
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm">
                                <thead>
                                    <tr class="border-b border-white/[0.06]">
                                        <th class="text-left py-3 px-4 text-xs text-gray-400 font-medium tracking-wider">DATE</th>
                                        <th class="text-left py-3 px-4 text-xs text-gray-400 font-medium tracking-wider">FROM</th>
                                        <th class="text-right py-3 px-4 text-xs text-gray-400 font-medium tracking-wider">AMOUNT</th>
                                        <th class="text-left py-3 px-4 text-xs text-gray-400 font-medium tracking-wider">TO</th>
                                        <th class="text-right py-3 px-4 text-xs text-gray-400 font-medium tracking-wider">RECEIVED</th>
                                        <th class="text-center py-3 px-4 text-xs text-gray-400 font-medium tracking-wider">STATUS</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="swp in data.recentSwaps" :key="swp.id">
                                        <tr class="border-b border-white/[0.06] hover:bg-white/[0.02] transition-colors">
                                            <td class="py-4 px-4 text-xs text-gray-400 font-mono" x-text="formatDate(swp.date)"></td>
                                            <td class="py-4 px-4 text-xs text-white" x-text="swp.from"></td>
                                            <td class="py-4 px-4 text-xs text-right text-white font-mono" x-text="formatNumber(swp.amount)"></td>
                                            <td class="py-4 px-4 text-xs text-white" x-text="swp.to"></td>
                                            <td class="py-4 px-4 text-xs text-right text-cyan-400 font-mono" x-text="formatNumber(swp.received)"></td>
                                            <td class="py-4 px-4 text-center">
                                                <span class="px-2 py-1 rounded text-xs font-medium" :class="swp.status === 'CONFIRMED' ? 'bg-emerald-400/10 text-emerald-400' : 'bg-gray-400/10 text-gray-400'" x-text="swp.status"></span>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </template>
        </main>
    </div>

    <script>
        function dashboardApp() {
            return {
                activeTab: 'Overview',
                demoMode: true,
                mobileMenuOpen: false,
                chartImageUrl: 'http://127.0.0.1:8088/chart.png',
                tabs: ['Overview', 'Rebalancer', 'HCS Signals', 'Swap'],

                data: {
                    status: 'online',
                    portfolio: {
                        totalUSD: 0,
                        wbtc: 0,
                        wbtcUSD: 0,
                        wbtcPercent: 0,
                        usdc: 0,
                        usdcPercent: 0,
                        hbar: 0,
                        hbarUSD: 0,
                        hbarPercent: 0
                    },
                    signal: {
                        allocation: 0,
                        stance: '—',
                        phase: 'Loading...'
                    },
                    lastRebalance: {
                        date: new Date(),
                        direction: '—',
                        amount: 0
                    },
                    hcs: {
                        topicId: '—',
                        lastBroadcast: new Date(),
                        messageCount: 0
                    },
                    allocation: {
                        wbtcCurrent: 0,
                        wbtcTarget: 50,
                        usdcCurrent: 0,
                        usdcTarget: 50
                    },
                    rebalanceHistory: [],
                    signals: [],
                    recentSwaps: []
                },

                swap: {
                    fromToken: 'WBTC',
                    toToken: 'USDC',
                    amount: null
                },

                init() {
                    this.fetchData();
                    setInterval(() => this.fetchData(), 30000);
                    setInterval(() => this.$nextTick(), 1000);
                },

                async fetchData() {
                    try {
                        // First, try to reach the health endpoint (no auth required)
                        const healthResp = await fetch('http://127.0.0.1:8088/health', {
                            mode: 'cors',
                            signal: AbortSignal.timeout(5000)
                        });

                        if (!healthResp.ok) throw new Error('Health check failed');

                        // Daemon is running - try to fetch live data
                        // We'll attempt without auth first; if 401, stay in demo mode
                        await this.fetchLiveData();
                        this.demoMode = false;
                    } catch (e) {
                        this.demoMode = true;
                    }
                },

                async fetchLiveData() {
                    // Try to fetch all endpoints. If any fail with 401, we'll stay in demo mode.
                    // These endpoints require the PACMAN_API_SECRET header or ?secret= query param.
                    // Since we don't have the secret, we'll attempt without it and let the backend decide.

                    try {
                        // Fetch holdings (rich per-token data with prices)
                        const holdingsResp = await fetch('http://127.0.0.1:8088/holdings', {
                            mode: 'cors',
                            signal: AbortSignal.timeout(5000)
                        });

                        if (holdingsResp.status === 401) {
                            throw new Error('Unauthorized - API secret required');
                        }

                        if (holdingsResp.ok) {
                            const holdingsData = await holdingsResp.json();
                            if (holdingsData && holdingsData.holdings) {
                                const totalUSD = holdingsData.total_usd || 0;
                                // Known token IDs on Hedera
                                const KNOWN = {
                                    HBAR: ['0.0.0'],
                                    USDC: ['0.0.456858', '0.0.1055459'],
                                    WBTC: ['0.0.834116', '0.0.1460300']
                                };
                                // Match holdings by token ID or symbol heuristics
                                let wbtcUSD = 0, wbtcBal = 0;
                                let usdcUSD = 0, usdcBal = 0;
                                let hbarUSD = 0, hbarBal = 0;

                                for (const h of holdingsData.holdings) {
                                    const sym = (h.symbol || '').toUpperCase();
                                    const id = h.token_id || h.symbol || '';
                                    if (KNOWN.WBTC.includes(id) || sym.includes('WBTC') || sym.includes('BTC')) {
                                        wbtcBal += h.balance; wbtcUSD += h.value_usd;
                                    } else if (KNOWN.USDC.includes(id) || sym.includes('USDC') || sym === 'USD') {
                                        usdcBal += h.balance; usdcUSD += h.value_usd;
                                    } else if (KNOWN.HBAR.includes(id) || sym === 'HBAR' || sym.includes('WHBAR')) {
                                        hbarBal += h.balance; hbarUSD += h.value_usd;
                                    } else {
                                        // Unknown tokens — group with HBAR for "other"
                                        hbarBal += 0; hbarUSD += h.value_usd;
                                    }
                                }

                                const wbtcPct = totalUSD > 0 ? (wbtcUSD / totalUSD * 100) : 0;
                                const usdcPct = totalUSD > 0 ? (usdcUSD / totalUSD * 100) : 0;
                                const hbarPct = totalUSD > 0 ? (hbarUSD / totalUSD * 100) : 0;

                                this.data.portfolio.totalUSD = totalUSD;
                                this.data.portfolio.wbtc = wbtcBal;
                                this.data.portfolio.wbtcUSD = wbtcUSD;
                                this.data.portfolio.wbtcPercent = Math.round(wbtcPct);
                                this.data.portfolio.usdc = usdcBal;
                                this.data.portfolio.usdcPercent = Math.round(usdcPct);
                                this.data.portfolio.hbar = hbarBal;
                                this.data.portfolio.hbarUSD = hbarUSD;
                                this.data.portfolio.hbarPercent = Math.round(hbarPct);

                                this.data.allocation.wbtcCurrent = Math.round(wbtcPct);
                                this.data.allocation.usdcCurrent = Math.round(usdcPct);
                            }
                        }

                        // Fetch status data
                        const statusResp = await fetch('http://127.0.0.1:8088/status', {
                            mode: 'cors',
                            signal: AbortSignal.timeout(5000)
                        });

                        if (statusResp.ok) {
                            const statusData = await statusResp.json();
                            if (statusData) {
                                this.data.status = 'online';
                                // Update HCS info if available
                                if (statusData.hcs && statusData.hcs.topic_id) {
                                    this.data.hcs.topicId = statusData.hcs.topic_id;
                                }
                                // Extract PowerLaw plugin signal for Overview card
                                const pl = (statusData.plugins || []).find(p => p.name === 'PowerLaw');
                                if (pl && pl.signal) {
                                    const sig = pl.signal;
                                    this.data.signal.allocation = sig.allocation_pct || this.data.signal.allocation;
                                    this.data.signal.stance = (sig.stance || 'HOLD').toUpperCase();
                                    // Parse phase from tagline or phase field
                                    let phase = sig.phase || '';
                                    phase = phase.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                                    if (sig.tagline) {
                                        const parts = sig.tagline.split('|').map(s => s.trim());
                                        if (parts[2]) phase = parts[2];
                                    }
                                    this.data.signal.phase = phase;
                                    // Update allocation targets from signal
                                    this.data.allocation.wbtcTarget = sig.allocation_pct || 60;
                                    this.data.allocation.usdcTarget = 100 - (sig.allocation_pct || 60);
                                }
                            }
                        }

                        // Fetch HCS messages
                        const hcsResp = await fetch('http://127.0.0.1:8088/hcs/messages?limit=10', {
                            mode: 'cors',
                            signal: AbortSignal.timeout(5000)
                        });

                        if (hcsResp.ok) {
                            const messages = await hcsResp.json();
                            if (Array.isArray(messages)) {
                                // Update HCS message count and last broadcast time
                                this.data.hcs.messageCount = messages.length;
                                if (messages.length > 0 && messages[0].timestamp) {
                                    const secs = parseFloat(messages[0].timestamp);
                                    if (secs > 1e9) this.data.hcs.lastBroadcast = new Date(secs * 1000);
                                }
                                // Map messages to signals for the dashboard
                                this.data.signals = messages.slice(0, 5).map((msg, idx) => {
                                    const d = msg.data || msg;
                                    // Hedera timestamp is "seconds.nanoseconds" string
                                    let date = new Date();
                                    if (msg.timestamp) {
                                        const secs = parseFloat(msg.timestamp);
                                        if (secs > 1e9) date = new Date(secs * 1000);
                                        else date = new Date(msg.timestamp.replace(' ', 'T'));
                                    }
                                    // Parse phase from tagline: "Cycle 5 | 47% complete | Late Cycle Peak Zone | ..."
                                    let phase = d.valuation || 'Unknown';
                                    if (d.tagline) {
                                        const parts = d.tagline.split('|').map(s => s.trim());
                                        phase = parts[2] || parts[0] || phase;
                                    }
                                    return {
                                        id: idx + 1,
                                        date,
                                        stance: (d.stance || 'HOLD').toUpperCase(),
                                        allocation: d.allocation_pct || d.allocation || 50,
                                        phase,
                                        confidence: d.confidence || (d.valuation === 'deep_value' ? 0.85 : 0.7)
                                    };
                                });

                                // Update the primary signal from the latest message
                                if (messages.length > 0) {
                                    const latest = messages[0].data || messages[0];
                                    this.data.signal.stance = (latest.stance || 'HOLD').toUpperCase();
                                    this.data.signal.allocation = latest.allocation_pct || latest.allocation || 50;
                                    let phase = latest.valuation || 'Unknown';
                                    if (latest.tagline) {
                                        const parts = latest.tagline.split('|').map(s => s.trim());
                                        phase = parts[2] || parts[0] || phase;
                                    }
                                    this.data.signal.phase = phase;
                                }
                            }
                        }

                        // Fetch execution history
                        const historyResp = await fetch('http://127.0.0.1:8088/history?limit=20', {
                            mode: 'cors',
                            signal: AbortSignal.timeout(5000)
                        });

                        if (historyResp.ok) {
                            const history = await historyResp.json();
                            if (Array.isArray(history)) {
                                // Map execution history to rebalance history
                                // Filter to only SWAP and POWERLAW type records
                                this.data.rebalanceHistory = history
                                    .filter(h => !h.type || h.type === 'SWAP' || h.type === 'POWERLAW')
                                    .slice(0, 10)
                                    .map((h, idx) => {
                                        let action = 'HOLD';
                                        let amount = 0;

                                        if (h.type === 'SWAP') {
                                            // Actual swap — check direction from route or token info
                                            const route = h.route || {};
                                            if (h.side === 'BUY' || (route.from_token || '').includes('USDC')) action = 'BUY';
                                            else if (h.side === 'SELL' || (route.to_token || '').includes('USDC')) action = 'SELL';
                                            else action = 'SELL';
                                            amount = h.amount_usd || h.amount_token || 0;
                                        } else if (h.type === 'POWERLAW') {
                                            // Check reason — "Deviation X% < Y%" means skip (HOLD)
                                            const err = h.error || '';
                                            if (err.includes('Deviation') && err.includes('<')) {
                                                action = 'HOLD';
                                            } else if (err.includes('BUY') || err.includes('buy')) {
                                                action = 'BUY';
                                            } else if (err.includes('SELL') || err.includes('sell')) {
                                                action = 'SELL';
                                            }
                                            amount = h.amount_usd || 0;
                                        }

                                        return {
                                            id: idx + 1,
                                            date: h.timestamp ? new Date(h.timestamp.replace(' ', 'T')) : new Date(),
                                            action,
                                            wbtc: h.wbtc_amount || 0,
                                            usdc: amount,
                                            price: amount,
                                            status: h.success ? 'CONFIRMED' : 'PENDING'
                                        };
                                    });

                                // Update last rebalance from most recent non-HOLD entry
                                const lastTrade = this.data.rebalanceHistory.find(h => h.action !== 'HOLD') || this.data.rebalanceHistory[0];
                                if (lastTrade) {
                                    this.data.lastRebalance.date = lastTrade.date;
                                    this.data.lastRebalance.direction = lastTrade.action;
                                    this.data.lastRebalance.amount = lastTrade.usdc || 0;
                                }

                                // Populate recent swaps from SWAP-type history entries
                                this.data.recentSwaps = history
                                    .filter(h => h.type === 'SWAP')
                                    .slice(0, 5)
                                    .map((h, idx) => {
                                        const route = h.route || {};
                                        return {
                                            id: idx + 1,
                                            date: h.timestamp ? new Date(h.timestamp.replace(' ', 'T')) : new Date(),
                                            from: route.from_token || '?',
                                            amount: h.amount_usd || h.amount_token || 0,
                                            to: route.to_token || '?',
                                            received: h.received_amount || 0,
                                            status: h.success ? 'CONFIRMED' : 'FAILED'
                                        };
                                    });
                            }
                        }

                    } catch (e) {
                        // If any live data fetch fails, fall back to demo mode
                        console.error('Error fetching live data:', e);
                        throw e;
                    }
                },

                toggleMobileMenu() {
                    this.mobileMenuOpen = !this.mobileMenuOpen;
                },

                closeMobileMenu() {
                    this.mobileMenuOpen = false;
                },

                formatNumber(num, decimals = 2) {
                    return parseFloat(num).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
                },

                formatDate(date) {
                    return new Date(date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                },

                formatTimeAgo(date) {
                    const seconds = Math.floor((new Date() - new Date(date)) / 1000);
                    if (seconds < 60) return seconds + 's ago';
                    if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
                    if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
                    return Math.floor(seconds / 86400) + 'd ago';
                },

                getStanceColor(stance) {
                    const s = (stance || '').toUpperCase();
                    if (s === 'ACCUMULATE') return 'bg-emerald-400/10 text-emerald-400';
                    if (s === 'DISTRIBUTE' || s === 'SELL') return 'bg-red-400/10 text-red-400';
                    if (s === 'BALANCED' || s === 'HOLD') return 'bg-amber-400/10 text-amber-400';
                    return 'bg-cyan-400/10 text-cyan-400';
                },

                getCountdown() {
                    const now = new Date();
                    const nextCheck = new Date(now.getTime() + (30 - (now.getMinutes() % 30)) * 60000);
                    const minutes = Math.floor((nextCheck - now) / 60000);
                    const seconds = Math.floor(((nextCheck - now) % 60000) / 1000);
                    return minutes + 'm ' + seconds + 's';
                },

                handleChartError() {
                    // If chart fails to load, fall back to placeholder
                    console.warn('Failed to load power law chart');
                    this.demoMode = true;
                }
            }
        }
    </script>
</body>
